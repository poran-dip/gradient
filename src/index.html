<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="version" content="1.0.3" />
    <title>Animated Gradient</title>
    <link
      rel="icon"
      type="image/png"
      href="assets/icons/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
    <link rel="shortcut icon" href="assets/icons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/icons/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Gradient" />
    <link rel="manifest" href="/gradient/site.webmanifest" />
    <meta name="theme-color" content="#23a6d5" />
    <meta name="background-color" content="#23a6d5" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="a nice css background" />
    <meta property="og:title" content="Animated Gradient" />
    <meta property="og:description" content="a nice css background" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Poran Dip" />
    <link rel="preload" href="styles.css" as="style" />
    <link rel="modulepreload" href="script.js" as="script" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div
        class="animated-gradient"
        role="presentation"
        aria-hidden="true"
        data-animation="gradient"
        data-duration="15s"
        data-easing="ease"
        data-direction="infinite"
      ></div>
      <h1 class="title" role="heading" aria-level="1" aria-label="Page title">
        Nice CSS background (gradient + animated)
      </h1>
      <div
        class="code-wrapper"
        role="region"
        aria-label="Code snippet"
        aria-live="polite"
      >
        <button
          class="copy"
          type="button"
          aria-label="Copy code to clipboard"
          aria-live="polite"
          aria-atomic="true"
        >
          Copy
        </button>
        <pre class="code-block" aria-label="CSS code block"><code 
          class="code-snippet"
          aria-label="Copyable CSS code"
        ></code></pre>
      </div>
    </main>
    <script src="script.js" type="module"></script>
  </body>
</html>
