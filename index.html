<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Gradient</title>
    <link
      rel="icon"
      type="image/png"
      href="/gradient/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/gradient/favicon.svg" />
    <link rel="shortcut icon" href="/gradient/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/gradient/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Gradient" />
    <link rel="manifest" href="/gradient/site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="animated-gradient"></div>
    <h1 class="title">Nice CSS background (gradient + animated)</h1>
    <div class="code-wrapper">
      <button class="copy">Copy</button>
      <pre class="code-block"><code class="code-snippet"></code></pre>
    </div>
    <script src="script.js"></script>
  </body>
</html>
